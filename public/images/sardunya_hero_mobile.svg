    <circle  cx="0" cy="0"   r="5"  fill="#ffcce4"/>
  </g>
  <g transform="translate(175,453)">
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp1)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp3)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp4)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp2)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp1)" transform="rotate(288)"/>
    <circle  cx="0" cy="0"   r="5"  fill="#ffd4ec"/>
  </g>
  <!-- Sub-branch flowers (smaller) -->
  <g transform="translate(158,447)">
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp2)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp4)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp1)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp3)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp2)" transform="rotate(288)"/>
    <circle  cx="0" cy="0"  r="4"  fill="#ffcce8"/>
  </g>
  <g transform="translate(266,443)">
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp3)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp1)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp2)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp4)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp3)" transform="rotate(288)"/>
    <circle  cx="0" cy="0"  r="4"  fill="#ffd0e4"/>
  </g>

  <!-- ════════════ LEFT PARTIAL POT ════════════ -->
  <rect x="-8"  y="682" width="98"  height="12" rx="6" fill="#a06040"/>
  <path d="M0 694 Q41 742 82 694 Z" fill="url(#mpot1)"/>
  <rect x="4"   y="644" width="74"  height="52" rx="6" fill="url(#mpot2)"/>
  <rect x="4"   y="644" width="74"  height="10" rx="5" fill="#e0a070"/>
  <ellipse cx="41" cy="650" rx="33" ry="7" fill="#5a3820"/>
  <line x1="41" y1="650" x2="22" y2="518" stroke="url(#mstem)" stroke-width="4" stroke-linecap="round"/>
  <line x1="41" y1="650" x2="58" y2="542" stroke="url(#mstem)" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="30" cy="582" rx="18" ry="7" fill="url(#mleaf2)" transform="rotate(-25 30 582)" fill-opacity="0.8"/>
  <g transform="translate(22,513)">
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp1)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp3)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp2)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp4)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp1)" transform="rotate(288)"/>
    <circle  cx="0" cy="0"   r="5"  fill="#ffd4ec"/>
  </g>
  <g transform="translate(58,537)">
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp4)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp2)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp3)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp1)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp4)" transform="rotate(288)"/>
    <circle  cx="0" cy="0"  r="4"  fill="#ffd0e8"/>
  </g>

  <!-- ════════════ RIGHT PARTIAL POT ════════════ -->
  <rect x="340" y="674" width="98"  height="12" rx="6" fill="#a06040"/>
  <path d="M348 686 Q389 734 430 686 Z" fill="url(#mpot1)"/>
  <rect x="352" y="636" width="74"  height="52" rx="6" fill="url(#mpot2)"/>
  <rect x="352" y="636" width="74"  height="10" rx="5" fill="#e0a070"/>
  <ellipse cx="389" cy="642" rx="33" ry="7" fill="#5a3820"/>
  <line x1="389" y1="642" x2="372" y2="510" stroke="url(#mstem)" stroke-width="4" stroke-linecap="round"/>
  <line x1="389" y1="642" x2="410" y2="530" stroke="url(#mstem)" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="382" cy="570" rx="18" ry="7" fill="url(#mleaf)" transform="rotate(25 382 570)" fill-opacity="0.8"/>
  <g transform="translate(372,505)">
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp3)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp1)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp4)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp2)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-11" rx="7" ry="10" fill="url(#mp3)" transform="rotate(288)"/>
    <circle  cx="0" cy="0"   r="5"  fill="#ffd0e4"/>
