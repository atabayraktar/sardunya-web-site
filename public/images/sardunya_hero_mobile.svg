    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="url(#mp2)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="url(#mp1)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-12" rx="7" ry="11" fill="url(#mp3)" transform="rotate(216)"/>
