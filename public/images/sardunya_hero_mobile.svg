  <g transform="translate(410,525)">
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp2)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp4)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp1)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp3)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-9" rx="5.5" ry="9" fill="url(#mp2)" transform="rotate(288)"/>
    <circle  cx="0" cy="0"  r="4"  fill="#ffcce8"/>
  </g>
</svg>
