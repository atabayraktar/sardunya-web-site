  <g transform="translate(230,393)">
    <ellipse cx="0" cy="-15" rx="9" ry="14" fill="url(#mp3)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-15" rx="9" ry="14" fill="url(#mp1)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-15" rx="9" ry="14" fill="url(#mp4)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-15" rx="9" ry="14" fill="url(#mp2)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-15" rx="9" ry="14" fill="url(#mp3)" transform="rotate(288)"/>
